<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Haridhra 🎉</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  padding:0;
  font-family: 'Poppins', sans-serif;
  background: radial-gradient(circle at top, #1a1f3b, #0d1024, #00010f);
  text-align: center;
  color: #f5e6c8;
}

h1 {
  font-size: 48px;
  margin-top: 30px;
  color: #f7d98c;
}

.card {
  background: rgba(255,255,255,0.08);
  border-radius: 20px;
  padding: 25px;
  width: 80%;
  max-width: 600px;
  margin: 20px auto;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

.photo {
  width: 100%;
  max-width: 350px;
  border-radius: 20px;
  margin: 15px 0;
  box-shadow: 0 5px 20px rgba(0,0,0,0.4);
}

#message {
  font-size: 18px;
  line-height: 1.8;
  min-height: 120px;
  white-space: pre-wrap;
}

.signature {
  margin-top: 12px;
  font-style: italic;
  color: #f7d98c;
}

button {
  padding: 12px 30px;
  font-size: 18px;
  border: none;
  border-radius: 30px;
  background: linear-gradient(to right, #d4a74f, #f7d98c);
  cursor: pointer;
}
</style>
</head>

<body>

<h1>🎉 Happy Birthday Haridhra 🎉</h1>

<div class="card">

  <!-- IMAGE -->
  <img src="haridhra.jpg" alt="Haridhra and Sriram" class="photo">

  <!-- MESSAGE -->
  <p id="message"></p>
  <p class="signature">— Sriram</p>
  <button onclick="startShow(); this.disabled=true;">Show Message</button>
</div>

<script>
const text = `Happy Birthday, Haridhra!
I’m really grateful to have you in my life.
Hope today brings you lots of smiles and happiness.
Wishing you a wonderful year ahead.`;

let i = 0;
const speed = 30;

function typeWriter() {
  if (i < text.length) {
    const char = text.charAt(i);
    document.getElementById("message").innerHTML += char === "\n" ? "<br>" : char;
    i++;
    setTimeout(typeWriter, speed);
  }
}

function startShow() {
  typeWriter();
}
</script>

</body>
</html>
