<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Haridhra ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;800&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  padding:0;
  font-family: 'Poppins', sans-serif;
  background: radial-gradient(circle at top, #1a1f3b, #0d1024, #00010f);
  overflow: hidden;
  text-align: center;
  color: #f5e6c8;
}

h1 {
  font-family: 'Playfair Display', serif;
  font-size: 60px;
  margin-top: 20px;
  color: #f7d98c;
  text-shadow: 0 0 15px rgba(255,215,140,0.8);
}

h2 {
  font-size: 22px;
  color: #ffe9b0;
}

#countdown {
  font-size: 26px;
  margin: 10px 0 20px;
  color: #f7d98c;
  text-shadow: 0 0 10px rgba(255,215,140,0.6);
}

.card {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,215,140,0.3);
  border-radius: 25px;
  padding: 30px;
  width: 85%;
  max-width: 900px;
  margin: auto;
  backdrop-filter: blur(10px);
  box-shadow: 0 10px 40px rgba(0,0,0,0.4);
}

.card p {
  font-size: 18px;
  line-height: 1.8;
  min-height: 220px;
}

.signature {
  margin-top: 15px;
  font-style: italic;
  font-weight: bold;
  color: #f7d98c;
}

button {
  padding: 14px 40px;
  font-size: 20px;
  margin-top: 15px;
  border: none;
  border-radius: 40px;
  background: linear-gradient(to right, #d4a74f, #f7d98c);
  color: #000;
  cursor: pointer;
  box-shadow: 0 5px 20px rgba(255,215,140,0.4);
}

canvas {
  position: fixed;
  top:0;
  left:0;
  pointer-events: none;
  z-index: 0;
}

@media (max-width:600px){
  h1{font-size:40px;}
  .card p{font-size:16px;}
}
</style>
</head>

<body>

<canvas id="fireworks"></canvas>

<h1>✨ Happy Birthday Haridhra ✨</h1>
<h2>21st June — A Magical Day</h2>
<div id="countdown"></div>

<div class="card">
<p id="message"></p>
<p class="signature">— With all my love, Your Big Brother, Sriram</p>
<button onclick="startShow(); this.disabled=true;">Celebrate 🎉</button>
</div>

<audio id="voice" src="https://www.soundjay.com/human/sounds/happy-birthday-01.mp3"></audio>

<script>
/* COUNTDOWN */
const countdown = document.getElementById("countdown");
const birthday = new Date(new Date().getFullYear(), 5, 21);

function updateCountdown(){
  const now = new Date();
  let diff = birthday - now;
  if(diff < 0){
    birthday.setFullYear(birthday.getFullYear()+1);
    diff = birthday - now;
  }
  const days = Math.floor(diff/(1000*60*60*24));
  const hours = Math.floor((diff/(1000*60*60))%24);
  const mins = Math.floor((diff/(1000*60))%60);
  const secs = Math.floor((diff/1000)%60);
  countdown.innerHTML = `⏳ ${days}d ${hours}h ${mins}m ${secs}s until your special day`;
}
setInterval(updateCountdown,1000);

/* TYPING MESSAGE */
const text = `My dearest little sister Haridhra,

You are the most beautiful girl in the world — my queen, my hamster, and my shining star. 👑🐹✨  
Your laughter lights up even the darkest days, and your kindness makes the world softer and more beautiful.

Watching you grow into such a graceful, talented, and loving soul is one of the greatest joys of my life.  
No matter where life takes you, your big brother Sriram will always be right beside you — cheering for you, protecting you, and loving you endlessly. 🌟

May your journey be filled with golden moments, sparkling dreams, and happiness that glows brighter than the stars.  
Never stop shining, my little princess. 🌙💛

Remember, every smile you share and every kind act you do adds more magic to the world. 💖`;

let i=0;
const speed=30;
function typeWriter(){
  if(i<text.length){
    document.getElementById("message").innerHTML += text.charAt(i).replace("\n","<br>");
    i++;
    setTimeout(typeWriter,speed);
  }
}

/* FIREWORKS */
const canvas = document.getElementById("fireworks");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let fireworks=[];

function createFirework(){
  const x = Math.random()*canvas.width;
  const y = Math.random()*canvas.height/2;
  const colors = ["#f7d98c","#ffe9b0","#ffffff","#ffcc66"];
  for(let i=0;i<40;i++){
    fireworks.push({
      x,y,
      radius:2,
      angle:Math.random()*2*Math.PI,
      speed:Math.random()*3+1,
      color:colors[Math.floor(Math.random()*colors.length)],
      life:60
    });
  }
}

function animateFireworks(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  fireworks.forEach((f,index)=>{
    f.x += Math.cos(f.angle)*f.speed;
    f.y += Math.sin(f.angle)*f.speed;
    f.life--;
    ctx.beginPath();
    ctx.arc(f.x,f.y,f.radius,0,Math.PI*2);
    ctx.fillStyle=f.color;
    ctx.fill();
    if(f.life<=0) fireworks.splice(index,1);
  });
  requestAnimationFrame(animateFireworks);
}

function startShow(){
  typeWriter();
  document.getElementById("voice").play();
  animateFireworks();
  setInterval(createFirework,800);
}
</script>

</body>
</html>
