<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Haridhra ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;800&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  padding:0;
  font-family: 'Poppins', sans-serif;
  background: radial-gradient(circle at top, #1a1f3b, #0d1024, #00010f);
  overflow: hidden;
  text-align: center;
  color: #f5e6c8;
}

h1 {
  font-family: 'Playfair Display', serif;
  font-size: 60px;
  margin-top: 20px;
  color: #f7d98c;
  text-shadow: 0 0 15px rgba(255,215,140,0.8);
}

h2 {
  font-size: 22px;
  color: #ffe9b0;
}

#countdown {
  font-size: 26px;
  margin: 10px 0 20px;
  color: #f7d98c;
  text-shadow: 0 0 10px rgba(255,215,140,0.6);
}

.card {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,215,140,0.3);
  border-radius: 25px;
  padding: 30px;
  width: 85%;
  max-width: 900px;
  margin: auto;
  backdrop-filter: blur(10px);
  box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  position: relative;
  z-index: 1;
}

.card p {
  font-size: 18px;
  line-height: 1.8;
  min-height: 220px;
  white-space: pre-wrap;
}

.signature {
  margin-top: 15px;
  font-style: italic;
  font-weight: bold;
  color: #f7d98c;
}

button {
  padding: 14px 40px;
  font-size: 20px;
  margin-top: 15px;
  border: none;
  border-radius: 40px;
  background: linear-gradient(to right, #d4a74f, #f7d98c);
  color: #000;
  cursor: pointer;
  box-shadow: 0 5px 20px rgba(255,215,140,0.4);
}

canvas {
  position: fixed;
  top:0;
  left:0;
  pointer-events: none;
  z-index: 0;
}

@media (max-width:600px){
  h1{font-size:40px;}
  .card p{font-size:16px;}
}
</style>
</head>

<body>

<canvas id="fireworks"></canvas>

<h1>✨ Happy Birthday Haridhra ✨</h1>
<h2>21st June — A Magical Day</h2>
<div id="countdown"></div>

<div class="card">
<p id="message"></p>
<p class="signature">— With all my love, Your Big Brother, Sriram</p>
<button onclick="startShow(); this.disabled=true;">Celebrate 🎉</button>
</div>

<audio id="voice" src="https://www.soundjay.com/human/sounds/happy-birthday-01.mp3"></audio>

<script>
/* COUNTDOWN */
const countdown = document.getElementById("countdown");
let birthday = new Date(new Date().getFullYear(), 5, 21);

function updateCountdown(){
  const now = new Date();
  let diff = birthday - now;
  if(diff < 0){
    birthday.setFullYear(birthday.getFullYear()+1);
    diff = birthday - now;
  }
  const days = Math.floor(diff/(1000*60*60*24));
  const hours = Math.floor((diff/(1000*60*60))%24);
  const mins = Math.floor((diff/(1000*60))%60);
  const secs = Math.floor((diff/1000)%60);
  countdown.innerHTML = `⏳ ${days}d ${hours}h ${mins}m ${secs}s until your special day`;
}
setInterval(updateCountdown,1000);

/* TYPING MESSAGE */
const text = `My dearest little sister Haridhra,

You didn’t come into my life through blood,
yet my heart claimed you as its own.
There was no grand entrance, no dramatic moment —
just a quiet magic that made my world brighter, warmer, alive.

There’s something enchanted about you,
not the kind that sparkles or shouts,
but the kind that turns ordinary moments
into something sacred.
Your voice is a gentle song,
your kindness the language you were born speaking.

Your beauty is quiet, in every little thing:
the way your eyes light up, the way they sparkle like stars,
the soft curve of your smile, the soft curve of your lips before it blooms,
the gentle warmth in your hands, the gentle warmth in the way you move,
the honesty in your voice, the honesty that fills the air,
the way your laughter fills the room, the way your laughter lifts hearts,
the way your face glows when you care, the way your face shines when you love—
all of it makes you radiant, all of it makes you irresistibly sweet,
a sweetness that makes me want to protect you,
a sweetness that makes me hold you close,
even when you insist you’re strong, even when you insist you’re unshakable.

And you are strong —
but in the softest, most human way.
You love without hesitation,
you give without expectation,
you carry a warmth that lifts even the heaviest days,
a warmth that lingers, a warmth that stays,
a warmth that makes the world feel safe.

You may not share my blood,
yet you are the sister my soul recognized —
the one whose laughter fills my lungs,
whose quiet pains echo in my chest,
the one I would guard fiercely,
the one I would hold fiercely,
the one I would stand beside,
without a second thought.

Haridhra, whenever the world feels heavy,
you can call me, and I’ll be there — no matter the hour.
You can scold me, tease me, or laugh at me until your cheeks hurt,
you can cry, rant, or let out all your frustrations on me.
You can sit in silence, or tell me every secret
that you’ve never shared with anyone else.
You can be angry, tender, messy, unstoppable —
I’ll hold space for all of it,
I’ll listen, I’ll protect, I’ll be your safe place,
without question, without hesitation,
because you are never alone while I am here.

If ever your light should dim,
a part of my world would fall silent.
You are woven into my days,
my memories,
my hopes,
my very sense of home.
I don’t just care about you —
I need you,
I need you because you’ve become part of the way I breathe,
I need you because you are my heart.

Today is your day, Haridhra,
a day to celebrate the wonder that you are,
a day to honor your laughter, your love, your light.
May this year bring you joy as radiant
as the joy you bring into everyone’s life,
and may your heart feel as cherished
as you make everyone around you feel.

You are magical.
You are loving.
You are fearless.
You are everything to me —
not because you try,
but because you simply are.

Happy Birthday, Haridhra.
`;

let i = 0;
const speed = 25;

function typeWriter() {
  if(i < text.length){
    const char = text.charAt(i);
    document.getElementById("message").innerHTML += char === "\n" ? "<br>" : char;
    i++;
    setTimeout(typeWriter, speed);
  }
}

/* FIREWORKS */
const canvas = document.getElementById("fireworks");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let fireworks = [];

function createFirework(){
  const x = Math.random()*canvas.width;
  const y = Math.random()*canvas.height/2;
  const colors = ["#f7d98c","#ffe9b0","#ffffff","#ffcc66"];
  for(let i=0;i<40;i++){
    fireworks.push({
      x, y,
      radius:2,
      angle:Math.random()*2*Math.PI,
      speed:Math.random()*3+1,
      color:colors[Math.floor(Math.random()*colors.length)],
      life:60
    });
  }
}

function animateFireworks(){
  ctx.fillStyle = "rgba(0,0,0,0.15)";
  ctx.fillRect(0,0,canvas.width,canvas.height);
  fireworks.forEach((f,index)=>{
    f.x += Math.cos(f.angle)*f.speed;
    f.y += Math.sin(f.angle)*f.speed;
    f.life--;
    ctx.beginPath();
    ctx.arc(f.x,f.y,f.radius,0,Math.PI*2);
    ctx.fillStyle=f.color;
    ctx.fill();
    if(f.life<=0) fireworks.splice(index,1);
  });
  requestAnimationFrame(animateFireworks);
}

function startShow(){
  typeWriter();
  document.getElementById("voice").play();
  animateFireworks();
  setInterval(createFirework,800);
}
</script>

</body>
</html>
